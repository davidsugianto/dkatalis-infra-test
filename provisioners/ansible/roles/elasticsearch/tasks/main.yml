---
# 1. Repository & installation

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - gpg
    state: present
    update_cache: true
  tags: [es_install]

- name: Download Elasticsearch GPG key
  ansible.builtin.get_url:
    url: https://artifacts.elastic.co/GPG-KEY-elasticsearch
    dest: /tmp/GPG-KEY-elasticsearch
    mode: '0644'
  tags: [es_install]

- name: Dearmor Elasticsearch GPG key into keyring
  ansible.builtin.shell: gpg --dearmor --yes --output /usr/share/keyrings/elasticsearch-keyring.gpg /tmp/GPG-KEY-elasticsearch
  args:
    creates: /usr/share/keyrings/elasticsearch-keyring.gpg
  tags: [es_install]

- name: Add Elasticsearch repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/elasticsearch-keyring.gpg] https://artifacts.elastic.co/packages/{{ es_version.split('.')[0] }}.x/apt stable main"
    state: present
    filename: elasticsearch
  tags: [es_install]

- name: Install Elasticsearch
  ansible.builtin.apt:
    name: "elasticsearch={{ es_version }}"
    state: present
    update_cache: true
  tags: [es_install]

# 2. System configuration

- name: Configure system memory limits (vm.max_map_count)
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    reload: true
  tags: [es_system]

- name: Configure system file descriptor limits
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    line: "elasticsearch  -  nofile  65535"
    create: true
    mode: "0644"
  tags: [es_system]

# 3. Directories & ownership

- name: Ensure Elasticsearch data directory exists with correct ownership
  ansible.builtin.file:
    path: /var/lib/elasticsearch
    state: directory
    owner: elasticsearch
    group: elasticsearch
    mode: '0750'
  tags: [es_dir]

- name: Ensure Elasticsearch log directory exists with correct ownership
  ansible.builtin.file:
    path: /var/log/elasticsearch
    state: directory
    owner: elasticsearch
    group: elasticsearch
    mode: '0750'
  tags: [es_dir]

- name: Ensure Elasticsearch config directory ownership is correct
  ansible.builtin.file:
    path: /etc/elasticsearch
    state: directory
    owner: root
    group: elasticsearch
    mode: '0750'
  tags: [es_dir]

- name: Ensure certs directory exists
  ansible.builtin.file:
    path: /etc/elasticsearch/certs
    state: directory
    owner: root
    group: elasticsearch
    mode: '0750'
  tags: [es_dir]

- name: Ensure ES keystore ownership is correct (keystore commands run as root reset it)
  ansible.builtin.file:
    path: /etc/elasticsearch/elasticsearch.keystore
    owner: root
    group: elasticsearch
    mode: '0660'
  tags: [es_dir]

# 4. Configure TLS certificates

- name: Generate and fetch TLS certificates (runs once, on the first node)
  ansible.builtin.include_tasks:
    file: certs.yml
    apply:
      delegate_to: "{{ es_first_node }}"
      run_once: true
  tags: [es_certs]

- name: Distribute the fetched certs to every node
  import_tasks: distribute-certs.yml
  tags: [es_certs]

# 5. Elasticsearch configuration

- name: Configure Elasticsearch JVM heap size
  ansible.builtin.template:
    src: heap.options.j2
    dest: /etc/elasticsearch/jvm.options.d/heap.options
    owner: root
    group: elasticsearch
    mode: '0660'
  notify: Restart elasticsearch
  tags: [es_config]

- name: Copy Elasticsearch configuration file
  ansible.builtin.template:
    src: elasticsearch.yml.j2
    dest: /etc/elasticsearch/elasticsearch.yml
    owner: root
    group: elasticsearch
    mode: '0660'
  notify: Restart elasticsearch
  tags: [es_config]

# 6. Service startup

- name: Enable and start Elasticsearch service
  ansible.builtin.systemd:
    name: elasticsearch
    state: started
    enabled: true
  tags: [es_service]

- name: Wait for Elasticsearch HTTP port to be reachable
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: 9200
    delay: 5
    timeout: 90
  tags: [es_service, es_validate]

# 7. Password setup

- name: Set elasticsearch password credentials
  ansible.builtin.include_tasks:
    file: creds.yml
    apply:
      delegate_to: "{{ es_first_node }}"
      run_once: true
  tags: [es_password]

# 8. Final validation

- name: Verify final password works and cluster is healthy
  ansible.builtin.uri:
    url: "https://127.0.0.1:9200/_cluster/health?wait_for_nodes={{ es_node_count }}&timeout=60s"
    method: GET
    user: elastic
    password: "{{ elastic_password }}"
    validate_certs: false
    status_code: 200
  register: final_check
  run_once: true
  retries: 5
  delay: 10
  until: final_check.status == 200
  no_log: true
  tags: [es_validate]

- name: Report cluster status
  ansible.builtin.debug:
    msg: >
      Cluster: {{ final_check.json.cluster_name }},
      Status: {{ final_check.json.status }},
      Nodes: {{ final_check.json.number_of_nodes }}/{{ es_node_count }}
  run_once: true
  tags: [es_validate]