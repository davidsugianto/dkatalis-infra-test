---
- name: Create certs working directory
  ansible.builtin.file:
    path: /etc/elasticsearch/certs
    state: directory
    owner: root
    group: elasticsearch
    mode: "0750"
  tags: [es_certs, es_certs_ca]

- name: Generate CA (elastic-stack-ca.p12)
  ansible.builtin.command:
    cmd: >
      /usr/share/elasticsearch/bin/elasticsearch-certutil ca
      --out /etc/elasticsearch/certs/elastic-stack-ca.p12
      --pass "{{ elastic_cert_password }}"
    creates: /etc/elasticsearch/certs/elastic-stack-ca.p12
  tags: [es_certs, es_certs_ca]

- name: Render instances.yml for all cluster nodes
  ansible.builtin.template:
    src: instances.yml.j2
    dest: /etc/elasticsearch/certs/instances.yml
    owner: root
    group: elasticsearch
    mode: "0640"
  tags: [es_certs, es_certs_transport]

- name: Generate per-node cert bundle signed by the CA
  ansible.builtin.command:
    cmd: >
      /usr/share/elasticsearch/bin/elasticsearch-certutil cert
      --ca /etc/elasticsearch/certs/elastic-stack-ca.p12
      --ca-pass "{{ elastic_cert_password }}"
      --in /etc/elasticsearch/certs/instances.yml
      --out /etc/elasticsearch/certs/certs-bundle.zip
      --pass "{{ elastic_cert_password }}"
    creates: /etc/elasticsearch/certs/certs-bundle.zip
  tags: [es_certs, es_certs_transport]

- name: Fetch cert bundle to the control node's role files
  ansible.builtin.fetch:
    src: /etc/elasticsearch/certs/certs-bundle.zip
    dest: "{{ role_path }}/files/certs-bundle.zip"
    flat: true
  tags: [es_certs, es_certs_fetch]