---
- name: Wait for cluster to be formed (HTTP layer answering)
  ansible.builtin.uri:
    url: "https://127.0.0.1:9200/_cluster/health"
    method: GET
    validate_certs: false
    status_code: [200, 401]
  register: cluster_up
  retries: 12
  delay: 10
  until: cluster_up.status in [200, 401]
  run_once: true
  delegate_to: "{{ groups['tag_Hostgroup_es_node'][0] }}"

- name: Probe whether vaulted password already works
  ansible.builtin.uri:
    url: "https://127.0.0.1:9200/_cluster/health"
    method: GET
    user: elastic
    password: "{{ elastic_password }}"
    validate_certs: false
    status_code: [200, 401]
  register: password_probe
  run_once: true
  no_log: true
  delegate_to: "{{ groups['tag_Hostgroup_es_node'][0] }}"

- name: Reset elastic user password (batch, non-interactive)
  ansible.builtin.command:
    cmd: /usr/share/elasticsearch/bin/elasticsearch-reset-password -u elastic -b -s --url https://127.0.0.1:9200
  register: reset_result
  no_log: true
  changed_when: true
  retries: 3
  delay: 15
  until: reset_result.rc == 0
  run_once: true
  delegate_to: "{{ groups['tag_Hostgroup_es_node'][0] }}"
  when: password_probe.status == 401

- name: Fix keystore ownership after reset (tool rewrites it as root)
  ansible.builtin.file:
    path: /etc/elasticsearch/elasticsearch.keystore
    owner: root
    group: elasticsearch
    mode: '0660'
  delegate_to: "{{ groups['tag_Hostgroup_es_node'][0] }}"
  run_once: true
  when: password_probe.status == 401

- name: Extract auto-generated password from reset output
  ansible.builtin.set_fact:
    initial_elastic_password: "{{ reset_result.stdout | regex_search('New value: (.+)', '\\1') | first }}"
  no_log: true
  run_once: true
  when: password_probe.status == 401

- name: Set elastic user password to vaulted value
  ansible.builtin.uri:
    url: "https://127.0.0.1:9200/_security/user/elastic/_password"
    method: POST
    user: elastic
    password: "{{ initial_elastic_password }}"
    body_format: json
    body:
      password: "{{ elastic_password }}"
    validate_certs: false
    status_code: 200
  no_log: true
  run_once: true
  delegate_to: "{{ groups['tag_Hostgroup_es_node'][0] }}"
  when: password_probe.status == 401

- name: Verify vaulted password works
  ansible.builtin.uri:
    url: "https://127.0.0.1:9200/_cluster/health"
    method: GET
    user: elastic
    password: "{{ elastic_password }}"
    validate_certs: false
    status_code: 200
  run_once: true
  no_log: true
  delegate_to: "{{ groups['tag_Hostgroup_es_node'][0] }}"