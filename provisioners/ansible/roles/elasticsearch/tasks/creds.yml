---
- name: Check if we've already bootstrapped the elastic password
  ansible.builtin.stat:
    path: /etc/elasticsearch/.elastic_password_set
  register: password_marker
  tags: [es_password]

- name: Check if vaulted password is actually valid right now
  ansible.builtin.uri:
    url: "https://127.0.0.1:9200/_security/_authenticate"
    method: GET
    user: elastic
    password: "{{ elastic_password }}"
    validate_certs: false
    status_code: [200, 401]
  register: auth_check
  ignore_errors: true
  tags: [es_password]

- name: Bootstrap elastic password (auto-generated, temporary)
  ansible.builtin.command: >
    /usr/share/elasticsearch/bin/elasticsearch-reset-password
    -u elastic -a -s -b --url https://127.0.0.1:9200
  register: bootstrap_password
  no_log: true
  when: not password_marker.stat.exists or auth_check.status != 200
  changed_when: true
  retries: 5
  delay: 10
  until: bootstrap_password.rc == 0
  tags: [es_password]

- name: Set the desired custom password via Security API
  ansible.builtin.uri:
    url: "https://127.0.0.1:9200/_security/user/elastic/_password"
    method: POST
    user: elastic
    password: "{{ bootstrap_password.stdout | trim }}"
    body_format: json
    body:
      password: "{{ elastic_password }}"
    validate_certs: false
  no_log: true
  when: not password_marker.stat.exists or auth_check.status != 200
  tags: [es_password]

- name: Mark password as configured
  ansible.builtin.file:
    path: /etc/elasticsearch/.elastic_password_set
    state: touch
    owner: elasticsearch
    group: elasticsearch
    mode: '0600'
  when: not password_marker.stat.exists or auth_check.status != 200
  tags: [es_password]

- name: Verify new password authenticates successfully
  ansible.builtin.uri:
    url: "https://127.0.0.1:9200/_cluster/health"
    method: GET
    user: elastic
    password: "{{ elastic_password }}"
    validate_certs: false
    status_code: 200
  tags: [es_password]